name: K-Babsang Instagram Menu Scraper

on:
  # Migrated to Vercel Cron to avoid GitHub Actions scheduler delays.
  # schedule:
  #   # 11:30 AM KST is 2:30 AM UTC
  #   - cron: '30 2 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI for testing

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Scraper
        env:
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          node scratch/scraper.js
